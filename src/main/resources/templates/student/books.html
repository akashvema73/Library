<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books - City Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy:#1a3a4a; --accent:#e8a838; --grey:#f4f6f8; --muted:#6b7280; }
        body { font-family: Arial, sans-serif; background: var(--grey); margin: 0; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: linear-gradient(180deg, var(--navy), #24506a); padding: 24px 16px; color: #fff; flex-shrink: 0; }
        .brand { font-family: Georgia, serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .brand-sub { font-size: 12px; opacity: .7; margin-bottom: 28px; }
        .side-link { display: block; padding: 10px 14px; border-radius: 8px; color: #fff; text-decoration: none; margin-bottom: 6px; font-size: 14px; }
        .side-link:hover, .side-link.active { background: rgba(255,255,255,.1); color: #fff; }
        .main { flex: 1; padding: 28px; }
        .page-title { font-family: Georgia, serif; font-size: 30px; color: var(--navy); margin-bottom: 4px; }
        .panel { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
        .book-card { background: #fff; border: 1px solid #e2e6ea; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
        .book-card h6 { color: var(--navy); font-weight: 700; margin-bottom: 4px; font-size: 15px; }
        .book-card .author { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
        .badge-genre { background: #e8f4fd; color: #1a3a4a; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .badge-avail { background: #d1e7dd; color: #0a5132; padding: 3px 8px; border-radius: 20px; font-size: 12px; }
        .badge-unavail { background: #f8d7da; color: #842029; padding: 3px 8px; border-radius: 20px; font-size: 12px; }
        .btn-borrow { background: var(--navy); color: #fff; border: none; padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .btn-borrow:hover { background: #24506a; }
        .btn-borrow:disabled { background: #aaa; cursor: not-allowed; }
        .search-bar input { border: 1px solid #dde2e8; border-radius: 8px; padding: 10px 14px; font-size: 14px; }
        .search-bar button { background: var(--navy); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
<div class="wrapper">

    <aside class="sidebar">
        <div class="brand">📚 City Library</div>
        <div class="brand-sub">Member Access</div>
        <a href="/student/dashboard" class="side-link">Dashboard</a>
        <a href="/student/books" class="side-link active">Browse Books</a>
        <a href="/logout" class="side-link">Logout</a>
    </aside>

    <main class="main">

        <div class="page-title">Browse Books</div>
        <p style="color:#6b7280; margin-bottom:20px;">Search and borrow from our collection.</p>

        <form method="get" action="/student/books" class="d-flex gap-2 mb-4 search-bar">
            <input type="text" name="search" placeholder="Search by title..." th:value="${search}" style="flex:1;">
            <button type="submit">Search</button>
        </form>

        <div class="row g-3" th:if="${!#lists.isEmpty(books)}">
            <div class="col-md-4" th:each="book : ${books}">
                <div class="book-card">
                    <h6 th:text="${book.title}">Book Title</h6>
                    <div class="author" th:text="|by ${book.author}|">Author</div>
                    <div class="d-flex gap-2 align-items-center mb-3">
                        <span class="badge-genre" th:text="${book.genre}">Genre</span>
                        <span class="badge-avail" th:if="${book.availableCopies > 0}" th:text="${book.availableCopies} + ' available'">Available</span>
                        <span class="badge-unavail" th:if="${book.availableCopies == 0}">Unavailable</span>
                    </div>
                    <form th:action="@{/student/borrow/{id}(id=${book.id})}" method="post">
                        <button type="submit" class="btn-borrow" th:disabled="${book.availableCopies == 0}">Borrow</button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(books)}" style="color:#6b7280; font-size:14px; padding:30px 0; text-align:center;">
            No books found. <a href="/student/books" style="color:#1a3a4a;">Clear search</a>
        </div>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

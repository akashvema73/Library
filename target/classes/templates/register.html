<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - City Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f8; font-family: Arial, sans-serif; }
        .register-card { margin-top: 50px; border: 1px solid #dde2e8; border-radius: 10px; }
        .title-text { color: #1a3a4a; font-weight: bold; font-family: Georgia, serif; }
        .btn-register { background: #1a3a4a; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 7px; font-weight: 600; }
        .btn-register:hover { background: #24506a; color: #fff; }
        .error-msg { background: #fff0f0; border: 1px solid #f5c6cb; color: #c0392b; padding: 10px 14px; border-radius: 7px; font-size: 14px; margin-bottom: 16px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark" style="background:#1a3a4a;">
    <div class="container">
        <a class="navbar-brand" href="/">City Library</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="card register-card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center title-text mb-1">Student Registration</h3>
                    <p class="text-center mb-4" style="color:#6b7280; font-size:14px;">Create a new library member account</p>

                    <div class="error-msg" th:if="${error}" th:text="${error}"></div>

                    <form action="/register" method="post">
                        <div class="mb-3">
                            <label class="form-label" style="font-size:14px; font-weight:600;">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter full name" th:value="${name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:14px; font-weight:600;">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Choose a username" th:value="${username}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:14px; font-weight:600;">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter email" th:value="${email}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:14px; font-weight:600;">Phone</label>
                            <input type="text" name="phone" class="form-control" placeholder="Enter phone number" th:value="${phone}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:14px; font-weight:600;">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                        </div>
                        <button type="submit" class="btn-register">Register as Student</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/login" style="font-size:13px; color:#1a3a4a; text-decoration:none;">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

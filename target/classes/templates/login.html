<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - City Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f8; font-family: Arial, sans-serif; }
        .login-card { margin-top: 80px; border: 1px solid #dde2e8; border-radius: 10px; }
        .title-text { color: #1a3a4a; font-weight: bold; font-family: Georgia, serif; }
        .btn-login { background: #1a3a4a; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 7px; font-weight: 600; }
        .btn-login:hover { background: #24506a; color: #fff; }
        .error-msg { background: #fff0f0; border: 1px solid #f5c6cb; color: #c0392b; padding: 10px 14px; border-radius: 7px; font-size: 14px; margin-bottom: 16px; }
        .success-msg { background: #edf9f0; border: 1px solid #b7e4c7; color: #21653c; padding: 10px 14px; border-radius: 7px; font-size: 14px; margin-bottom: 16px; }
        .register-link { color: #1a3a4a; font-weight: 600; text-decoration: none; }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark" style="background:#1a3a4a;">
    <div class="container">
        <a class="navbar-brand" href="/">City Library</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center title-text mb-1">Login</h3>
                    <p class="text-center mb-4" style="color:#6b7280; font-size:14px;">Access your library account</p>

                    <div class="error-msg" th:if="${error}" th:text="${error}"></div>
                    <div class="success-msg" th:if="${success}" th:text="${success}"></div>

                    <form action="/login" method="post">
                        <div class="mb-3">
                            <label class="form-label" style="font-size:14px; font-weight:600;">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:14px; font-weight:600;">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn-login">Login</button>
                    </form>

                    <div class="text-center mt-3" style="font-size:14px; color:#4b5563;">
                        New student?
                        <a href="/register" class="register-link">Create an account</a>
                    </div>

                    <div class="text-center mt-3">
                        <a href="/" style="font-size:13px; color:#1a3a4a; text-decoration:none;">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - City Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy:#1a3a4a; --accent:#e8a838; --grey:#f4f6f8; --muted:#6b7280; }
        body { font-family: Arial, sans-serif; background: var(--grey); margin: 0; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: linear-gradient(180deg, var(--navy), #24506a); padding: 24px 16px; color: #fff; flex-shrink: 0; }
        .brand { font-family: Georgia, serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .brand-sub { font-size: 12px; opacity: .7; margin-bottom: 28px; }
        .side-link { display: block; padding: 10px 14px; border-radius: 8px; color: #fff; text-decoration: none; margin-bottom: 6px; font-size: 14px; }
        .side-link:hover, .side-link.active { background: rgba(255,255,255,.1); color: #fff; }
        .main { flex: 1; padding: 28px; }
        .page-title { font-family: Georgia, serif; font-size: 30px; color: var(--navy); margin-bottom: 4px; }
        .panel { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
        .panel h5 { color: var(--navy); font-weight: 700; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 14px; }
        table th { background: #f8f9fa; font-size: 13px; color: #555; font-weight: 600; }
        table td { font-size: 13px; vertical-align: middle; }
        .badge-admin { background: #fde8b0; color: #7a4c00; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .badge-student { background: #d1e7dd; color: #0a5132; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
<div class="wrapper">

    <aside class="sidebar">
        <div class="brand">📚 City Library</div>
        <div class="brand-sub">Admin Panel</div>
        <a href="/admin/dashboard" class="side-link">Dashboard</a>
        <a href="/admin/books" class="side-link">Books</a>
        <a href="/admin/members" class="side-link active">Members</a>
        <a href="/admin/borrows" class="side-link">Borrow Records</a>
        <a href="/logout" class="side-link">Logout</a>
    </aside>

    <main class="main">

        <div class="page-title">Members</div>
        <p style="color:#6b7280; margin-bottom:22px;">All registered library members.</p>

        <div class="panel">
            <h5>Member List</h5>

            <div th:if="${#lists.isEmpty(members)}" style="color:#6b7280; font-size:14px; padding:16px 0;">
                No members registered yet.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(members)}">
                <table class="table table-bordered mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody th:each="m, i : ${members}">
                        <tr>
                            <td th:text="${i.count}">1</td>
                            <td th:text="${m.name}">Name</td>
                            <td th:text="${m.username}">Username</td>
                            <td th:text="${m.email}">Email</td>
                            <td th:text="${m.phone}">Phone</td>
                            <td>
                                <span class="badge-admin" th:if="${m.role == 'ADMIN'}">Admin</span>
                                <span class="badge-student" th:if="${m.role == 'STUDENT'}">Student</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

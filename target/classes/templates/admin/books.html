<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books - City Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy:#1a3a4a; --accent:#e8a838; --grey:#f4f6f8; --muted:#6b7280; }
        body { font-family: Arial, sans-serif; background: var(--grey); margin: 0; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 240px; background: linear-gradient(180deg, var(--navy), #24506a); padding: 24px 16px; color: #fff; flex-shrink: 0; }
        .brand { font-family: Georgia, serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .brand-sub { font-size: 12px; opacity: .7; margin-bottom: 28px; }
        .side-link { display: block; padding: 10px 14px; border-radius: 8px; color: #fff; text-decoration: none; margin-bottom: 6px; font-size: 14px; }
        .side-link:hover, .side-link.active { background: rgba(255,255,255,.1); color: #fff; }
        .main { flex: 1; padding: 28px; }
        .page-title { font-family: Georgia, serif; font-size: 30px; color: var(--navy); margin-bottom: 4px; }
        .panel { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
        .panel h5 { color: var(--navy); font-weight: 700; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 14px; }
        table th { background: #f8f9fa; font-size: 13px; color: #555; font-weight: 600; }
        table td { font-size: 13px; vertical-align: middle; }
        .form-control, .form-select { border: 1px solid #dde2e8; font-size: 14px; }
        .btn-add { background: var(--navy); color: #fff; border: none; padding: 10px 20px; border-radius: 7px; font-weight: 600; font-size: 14px; }
        .btn-add:hover { background: #24506a; color: #fff; }
        .btn-del { background: #c0392b; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; font-size: 12px; text-decoration: none; }
        .btn-del:hover { background: #a93226; color: #fff; }
    </style>
</head>
<body>
<div class="wrapper">

    <aside class="sidebar">
        <div class="brand">📚 City Library</div>
        <div class="brand-sub">Admin Panel</div>
        <a href="/admin/dashboard" class="side-link">Dashboard</a>
        <a href="/admin/books" class="side-link active">Books</a>
        <a href="/admin/members" class="side-link">Members</a>
        <a href="/admin/borrows" class="side-link">Borrow Records</a>
        <a href="/logout" class="side-link">Logout</a>
    </aside>

    <main class="main">

        <div class="page-title">Manage Books</div>
        <p style="color:#6b7280; margin-bottom:22px;">Add or remove books from the collection.</p>

        <div class="row g-4">

            <div class="col-lg-4">
                <div class="panel">
                    <h5>Add New Book</h5>
                    <form th:action="@{/admin/books/add}" method="post">
                        <div class="mb-3">
                            <label class="form-label" style="font-size:13px; font-weight:600;">Title</label>
                            <input type="text" name="title" class="form-control" required placeholder="Book title">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:13px; font-weight:600;">Author</label>
                            <input type="text" name="author" class="form-control" required placeholder="Author name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:13px; font-weight:600;">Genre</label>
                            <select name="genre" class="form-select">
                                <option value="Fiction">Fiction</option>
                                <option value="Non-Fiction">Non-Fiction</option>
                                <option value="Science">Science</option>
                                <option value="Technology">Technology</option>
                                <option value="History">History</option>
                                <option value="Biography">Biography</option>
                                <option value="Self-Help">Self-Help</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:13px; font-weight:600;">ISBN</label>
                            <input type="text" name="isbn" class="form-control" placeholder="ISBN number">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" style="font-size:13px; font-weight:600;">Total Copies</label>
                            <input type="number" name="totalCopies" class="form-control" required min="1" value="1">
                        </div>
                        <button type="submit" class="btn-add w-100">Add Book</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="panel">
                    <h5>All Books</h5>
                    <div th:if="${#lists.isEmpty(books)}" style="color:#6b7280; font-size:14px; padding:16px 0;">
                        No books added yet.
                    </div>
                    <div class="table-responsive" th:if="${!#lists.isEmpty(books)}">
                        <table class="table table-bordered mb-0">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Genre</th>
                                    <th>Total</th>
                                    <th>Available</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody th:each="book, i : ${books}">
                                <tr>
                                    <td th:text="${i.count}">1</td>
                                    <td th:text="${book.title}">Title</td>
                                    <td th:text="${book.author}">Author</td>
                                    <td th:text="${book.genre}">Genre</td>
                                    <td th:text="${book.totalCopies}">0</td>
                                    <td th:text="${book.availableCopies}">0</td>
                                    <td>
                                        <a th:href="@{/admin/books/delete/{id}(id=${book.id})}"
                                           class="btn-del"
                                           onclick="return confirm('Delete this book?')">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
